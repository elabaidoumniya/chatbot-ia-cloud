<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NeuralChat{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="flash-container" id="flashContainer">
            {% for category, message in messages %}
            <div class="flash flash-{{ category }}">
                <span>{{ message }}</span>
                <button onclick="this.parentElement.remove()">✕</button>
            </div>
            {% endfor %}
        </div>
        {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}

    <script>
        // Auto-dismiss flash messages
        setTimeout(() => {
            const fc = document.getElementById('flashContainer');
            if (fc) fc.style.opacity = '0', fc.style.transform = 'translateY(-20px)';
            setTimeout(() => fc && fc.remove(), 400);
        }, 4000);
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
