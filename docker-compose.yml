version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: chatbot_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/1.sql
    ports:
      - "5432:5432"

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  chatbot:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_URL=http://ollama:11434
      - DB_HOST=postgres
    depends_on:
      - postgres
      - ollama

  frontend:
    build: ./frontend
    ports:
      - "80:80"     # Frontend principal
      - "8080:80"   # Alternative
    depends_on:
      - chatbot

volumes:
  postgres_data:
  ollama_data: