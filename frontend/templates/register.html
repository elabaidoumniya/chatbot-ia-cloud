<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — NeuraChat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="../static/styles/style.css" />
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="auth-logo">
        <div class="logo-icon">🤖</div>
        <span>NeuraChat</span>
      </div>

      <h2>Create account</h2>
      <p class="subtitle">Join and start chatting with your AI assistant</p>

      <form id="registerForm" novalidate>

        <div class="form-group">
          <label class="form-label" for="regUsername">Username</label>
          <div class="input-group-icon">
            <i class="bi bi-person icon"></i>
            <input
              type="text"
              id="regUsername"
              class="form-control"
              placeholder="Your display name"
              autocomplete="username"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="regEmail">Email address</label>
          <div class="input-group-icon">
            <i class="bi bi-envelope icon"></i>
            <input
              type="email"
              id="regEmail"
              class="form-control"
              placeholder="you@example.com"
              autocomplete="email"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="regPassword">Password</label>
          <div class="input-group-icon">
            <i class="bi bi-lock icon"></i>
            <input
              type="password"
              id="regPassword"
              class="form-control"
              placeholder="At least 6 characters"
              autocomplete="new-password"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="regConfirm">Confirm password</label>
          <div class="input-group-icon">
            <i class="bi bi-lock-fill icon"></i>
            <input
              type="password"
              id="regConfirm"
              class="form-control"
              placeholder="Repeat your password"
              autocomplete="new-password"
              required
            />
          </div>
        </div>

        <button type="submit" id="registerBtn" class="btn-primary-custom" style="margin-top:0.4rem;">
          Create Account
        </button>

      </form>

      <div class="auth-footer" style="margin-top:1.2rem;">
        Already have an account? <a href="index.html">Sign in</a>
      </div>

    </div>
  </div>

  <div class="toast-container"></div>
  <script src="../scripts/app.js"></script>
</body>
</html>
