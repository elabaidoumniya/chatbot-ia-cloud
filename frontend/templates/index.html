<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — NeuraChat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="../static/styles/style.css" />
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-card">

      <!-- Logo -->
      <div class="auth-logo">
        <div class="logo-icon">🤖</div>
        <span>NeuraChat</span>
      </div>

      <h2>Welcome back</h2>
      <p class="subtitle">Sign in to your account to continue</p>

      <!-- Login Form -->
      <form id="loginForm" novalidate>

        <div class="form-group">
          <label class="form-label" for="loginEmail">Email address</label>
          <div class="input-group-icon">
            <i class="bi bi-envelope icon"></i>
            <input
              type="email"
              id="loginEmail"
              class="form-control"
              placeholder="you@example.com"
              autocomplete="email"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="loginPassword">Password</label>
          <div class="input-group-icon">
            <i class="bi bi-lock icon"></i>
            <input
              type="password"
              id="loginPassword"
              class="form-control"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
            />
          </div>
        </div>

        <div class="form-check-row">
          <label>
            <input type="checkbox" id="rememberMe" />
            Remember me
          </label>
          <a href="#">Forgot password?</a>
        </div>

        <button type="submit" id="loginBtn" class="btn-primary-custom">
          Sign In
        </button>

      </form>

      <div class="divider">or</div>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Create one</a>
      </div>

      <!-- Hint for demo -->
      <div style="margin-top:1.2rem; padding:10px 14px; background:rgba(79,142,247,0.08); border:1px solid rgba(79,142,247,0.2); border-radius:10px; font-size:0.78rem; color:#7a8ba0; text-align:center;">
        <strong style="color:#4f8ef7;">Demo credentials:</strong><br/>
        nour@example.com / password123
      </div>

    </div>
  </div>

  <div class="toast-container"></div>
  <script src="../scripts/app.js"></script>
</body>
</html>
