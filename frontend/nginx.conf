server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy vers ton backend FastAPI
    location /chat {
        proxy_pass http://chatbot:8000/chat;
    }

    location /health {
        proxy_pass http://chatbot:8000/health;
    }
}